<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KIA RIO">

<title>KIA RIO Remote</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#000;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

.container{
    width:100%;
    max-width:430px;

    background:#111;

    border:1px solid #222;

    border-radius:35px;

    overflow:hidden;

    box-shadow:
        0 25px 60px rgba(0,0,0,.8),
        inset 0 1px 0 rgba(255,255,255,.05);
}

/* ==========================
   HERO IMAGE
========================== */

.hero{
    padding:20px 20px 10px;
    text-align:center;
    background:linear-gradient(
        to bottom,
        #161616,
        #0d0d0d
    );
}

.hero img{
    width:100%;
    max-width:380px;
    object-fit:contain;

    filter:
        drop-shadow(0 10px 30px rgba(255,255,255,.08));
}

/* ==========================
   TITLE
========================== */

.header{
    text-align:center;
    padding:10px 25px 25px;
}

.kia{
    font-size:42px;
    font-weight:900;
    letter-spacing:8px;
    color:white;
}

.model{
    margin-top:8px;
    color:#999;
    letter-spacing:5px;
    font-size:13px;
}

.status{
    margin:20px auto 0;

    width:fit-content;

    padding:10px 16px;

    border-radius:20px;

    background:#090909;

    border:1px solid #222;

    color:#ccc;

    font-size:13px;
}

/* ==========================
   BUTTONS
========================== */

.controls{
    padding:25px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.btn{
    background:#181818;

    border:1px solid #2c2c2c;

    border-radius:25px;

    padding:24px 10px;

    color:white;

    cursor:pointer;

    transition:.25s;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.btn:hover{
    transform:translateY(-3px);
    background:#202020;
}

.btn:active{
    transform:scale(.97);
}

.icon{
    width:42px;
    height:42px;
    margin-bottom:12px;
}

.command{
    font-size:20px;
    font-weight:bold;

    padding:5px 14px;

    border-radius:20px;

    background:#000;

    border:1px solid #333;

    margin-bottom:8px;
}

.label{
    font-size:12px;
    color:#aaa;
    letter-spacing:1px;
}

.start .command{
    color:#4CAF50;
}

.stop .command{
    color:#f44336;
}

.lock .command{
    color:#2196F3;
}

.unlock .command{
    color:#FF9800;
}

.start:hover{
    box-shadow:0 0 20px rgba(76,175,80,.25);
}

.stop:hover{
    box-shadow:0 0 20px rgba(244,67,54,.25);
}

.lock:hover{
    box-shadow:0 0 20px rgba(33,150,243,.25);
}

.unlock:hover{
    box-shadow:0 0 20px rgba(255,152,0,.25);
}

.footer{
    text-align:center;
    padding:0 25px 25px;
    color:#555;
    font-size:11px;
    letter-spacing:2px;
}

@media(max-width:480px){

    .kia{
        font-size:34px;
    }

    .icon{
        width:36px;
        height:36px;
    }

    .command{
        font-size:18px;
    }
}

</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <img src="rio.jpg" alt="Kia Rio">
    </div>

    <div class="header">
        <div class="kia">KIA</div>

        <div class="model">
            RIO REMOTE CONTROL
        </div>

        <div class="status">
            ● Vehicle Online
        </div>
    </div>

    <div class="controls">

        <div class="grid">

            <!-- START -->
            <button class="btn start"
                    onclick="sendSMS('S')">

                <svg class="icon"
                     viewBox="0 0 24 24"
                     fill="#4CAF50">
                    <path d="M8 5v14l11-7z"/>
                </svg>

                <div class="label">START ENGINE</div>

            </button>

            <!-- STOP -->
            <button class="btn stop"
                    onclick="sendSMS('R')">

                <svg class="icon"
                     viewBox="0 0 24 24"
                     fill="#f44336">
                    <rect x="5"
                          y="5"
                          width="14"
                          height="14"
                          rx="2"/>
                </svg>

                <div class="label">STOP ENGINE</div>

            </button>

            <!-- LOCK -->
            <button class="btn lock"
                    onclick="sendSMS('L')">

                <svg class="icon"
                     viewBox="0 0 24 24"
                     fill="#2196F3">
                    <path d="M17 8h-1V6a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2zm-7-2a2 2 0 0 1 4 0v2h-4z"/>
                </svg>

                <div class="label">LOCK DOORS</div>

            </button>

            <!-- UNLOCK -->
            <button class="btn unlock"
                    onclick="sendSMS('U')">

                <svg class="icon"
                     viewBox="0 0 24 24"
                     fill="#FF9800">
                    <path d="M17 8h-6V6a2 2 0 1 1 4 0h2a4 4 0 1 0-8 0v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z"/>
                </svg>

                <div class="label">UNLOCK DOORS</div>

            </button>

        </div>

    </div>

    <div class="footer">
        KIA RIO • SMART CONTROL
    </div>

</div>

<script>

const PHONE_NUMBER = "09919063955";

function sendSMS(command){

    const smsLink =
        `sms:${PHONE_NUMBER}?body=${encodeURIComponent("'" + command)}`;

    window.location.href = smsLink;

    if(navigator.vibrate){
        navigator.vibrate(50);
    }
}

</script>

</body>
</html>
